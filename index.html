// ─── Login ────────────────────────────────────────────────────────────────────
const PIN_CORRETO = "2321";

function LoginScreen({onLogin}){
  const [pin,setPin]=useState("");
  const [erro,setErro]=useState(false);
  const [shake,setShake]=useState(false);

  const digitar=(d)=>{
    if(pin.length>=4)return;
    const novo=pin+d;
    setPin(novo);
    setErro(false);
    if(novo.length===4){
      if(novo===PIN_CORRETO){
        sessionStorage.setItem("mb_auth","1");
        onLogin();
      } else {
        setShake(true);
        setErro(true);
        setTimeout(()=>{setPin("");setShake(false);},600);
      }
    }
  };

  const apagar=()=>{ setPin(p=>p.slice(0,-1)); setErro(false); };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#3a2c0e",padding:32}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:12}}>🏪</div>
        <div style={{fontFamily:"'Playfair Display',serif",color:"#f5d78a",fontSize:24,fontWeight:700}}>Mini Box Andrérika</div>
        <div style={{color:"#c4a85a",fontSize:13,marginTop:4}}>Digite o PIN para entrar</div>
      </div>

      {/* Bolinhas do PIN */}
      <div style={{display:"flex",gap:16,marginBottom:32,animation:shake?"shake .4s ease":"none"}}>
        <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",background:i<pin.length?(erro?"#e53935":"#f5d78a"):"rgba(255,255,255,.2)",transition:"background .15s",border:"2px solid"+(i<pin.length?(erro?"#e53935":"#f5d78a"):"rgba(255,255,255,.3)")}}/>
        ))}
      </div>

      {/* Teclado numérico */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%",maxWidth:280}}>
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} onClick={()=>digitar(String(n))}
            style={{height:64,borderRadius:16,background:"rgba(255,255,255,.1)",color:"#fff",fontSize:24,fontWeight:600,transition:".1s",border:"none"}}
            onTouchStart={e=>e.currentTarget.style.background="rgba(255,255,255,.25)"}
            onTouchEnd={e=>e.currentTarget.style.background="rgba(255,255,255,.1)"}>
            {n}
          </button>
        ))}
        <div/>
        <button onClick={()=>digitar("0")}
          style={{height:64,borderRadius:16,background:"rgba(255,255,255,.1)",color:"#fff",fontSize:24,fontWeight:600,border:"none"}}
          onTouchStart={e=>e.currentTarget.style.background="rgba(255,255,255,.25)"}
          onTouchEnd={e=>e.currentTarget.style.background="rgba(255,255,255,.1)"}>
          0
        </button>
        <button onClick={apagar}
          style={{height:64,borderRadius:16,background:"rgba(255,255,255,.08)",color:"#c4a85a",fontSize:20,border:"none"}}>
          ⌫
        </button>
      </div>

      {erro&&<div style={{color:"#ef9a9a",fontSize:13,marginTop:20,fontWeight:500}}>PIN incorreto. Tente novamente.</div>}
    </div>
  );
}

// ─── html2canvas share ────────────────────────────────────────────────────────
let h2cPromise = null;
function getH2C() {
  if (!h2cPromise) h2cPromise = new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
    s.onload=()=>res(window.html2canvas); s.onerror=rej;
    document.head.appendChild(s);
  });
  return h2cPromise;
}
async function compartilhar(el, nome="recibo.png") {
  const h2c = await getH2C();
  const canvas = await h2c(el,{backgroundColor:"#faf7f2",scale:2,useCORS:true,logging:false});
  return new Promise((res,rej)=>{
    canvas.toBlob(async blob=>{
      if(!blob){rej(new Error("erro"));return;}
      const file=new File([blob],nome,{type:"image/png"});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:"Recibo Mini Box Andrérika"});res("shared");}
        catch(e){if(e.name!=="AbortError")rej(e);else res("aborted");}
      } else {
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=nome;a.click();
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        res("downloaded");
      }
    },"image/png");
  });
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [produtos,setProdutos]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [movimentos,setMovimentos]=useState([]);
  const [vendas,setVendas]=useState([]);
  const [loading,setLoading]=useState(true);
  const [erroConexao,setErroConexao]=useState(false);
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);

  const showToast=(msg,tipo="ok")=>{setToast({msg,tipo});setTimeout(()=>setToast(null),3200);};

  const carregar = useCallback(async () => {
    setLoading(true);
    try {
      const [rp,rc,rm,rv] = await Promise.all([
        sb.from("produtos").select("*").order("nome"),
        sb.from("clientes").select("*").order("nome"),
        sb.from("movimentos").select("*").order("data",{ascending:false}),
        sb.from("vendas").select("*").order("data",{ascending:false}),
      ]);
      if(rp.error||rc.error) throw new Error("Erro ao carregar");
      setProdutos(rp.data||[]);
      setClientes(rc.data||[]);
      setMovimentos(rm.data||[]);
      setVendas(rv.data||[]);
      setErroConexao(false);
    } catch(e) {
      setErroConexao(true);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(()=>{ carregar(); },[carregar]);

  // ── helpers de escrita
  const reloadProdutos = async () => { const {data}=await sb.from("produtos").select("*").order("nome"); if(data) setProdutos(data); };
  const reloadClientes = async () => { const {data}=await sb.from("clientes").select("*").order("nome"); if(data) setClientes(data); };
  const reloadMovimentos = async () => { const {data}=await sb.from("movimentos").select("*").order("data",{ascending:false}); if(data) setMovimentos(data); };
  const reloadVendas = async () => { const {data}=await sb.from("vendas").select("*").order("data",{ascending:false}); if(data) setVendas(data); };

  const alertas=produtos.filter(p=>Number(p.estoque)<=Number(p.minimo));
  const notinhasAbertas=clientes.map(c=>{
    const divida=movimentos.filter(m=>m.cliente_id===c.id&&!m.pago).reduce((s,m)=>s+Number(m.valor),0);
    return{...c,divida};
  }).filter(c=>c.divida>0);
  const totalNotinhas=notinhasAbertas.reduce((s,c)=>s+c.divida,0);
  const hoje=new Date();
  const vendasHoje=vendas.filter(v=>new Date(v.data).toDateString()===hoje.toDateString());
  const totalHoje=vendasHoje.reduce((s,v)=>s+Number(v.total),0);

  if(loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#faf7f2",gap:16}}>
      <div className="spinner"/>
      <div style={{fontFamily:"'Playfair Display',serif",color:"#8b6914",fontSize:16}}>Mini Box Andrérika</div>
      <div style={{color:"#8b7a50",fontSize:13}}>Carregando dados...</div>
    </div>
  );

  if(erroConexao) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#faf7f2",gap:16,padding:32,textAlign:"center"}}>
      <div style={{fontSize:48}}>📡</div>
      <div style={{fontFamily:"'Playfair Display',serif",color:"#3a2c0e",fontSize:20}}>Sem conexão</div>
      <div style={{color:"#8b7a50",fontSize:14}}>Verifique sua internet e tente novamente.</div>
      <button className="btn-primary" style={{marginTop:8}} onClick={carregar}>Tentar novamente</button>
    </div>
  );

  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#faf7f2",minHeight:"100vh",maxWidth:480,margin:"0 auto",position:"relative"}}>
      {/* Header */}
      <div style={{background:"#3a2c0e",padding:"20px 20px 16px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <span style={{fontSize:24}}>🏪</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",color:"#f5d78a",fontSize:16,fontWeight:700,lineHeight:1}}>Mini Box Andrérika</div>
            <div style={{color:"#c4a85a",fontSize:10}}>Sistema de Gestão</div>
          </div>
          {alertas.length>0&&(
            <div style={{marginLeft:"auto",background:"#e65100",color:"#fff",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
              <Icon name="alert" size={12}/> {alertas.length}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:5}}>
          {[
            {id:"dashboard",icon:"chart",label:"Início"},
            {id:"venda",icon:"cart",label:"Venda"},
            {id:"estoque",icon:"box",label:"Estoque"},
            {id:"notinhas",icon:"receipt",label:"Notinhas"},
            {id:"clientes",icon:"users",label:"Clientes"},
          ].map(t=>(
            <button key={t.id} className={tab===t.id?"tab-active":""} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"7px 2px",borderRadius:10,background:"rgba(255,255,255,.1)",color:"#c4a85a",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:9,fontWeight:600,transition:".15s"}}>
              <Icon name={t.icon} size={15}/>{t.label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:16,paddingBottom:40}} className="animate-in">
        {tab==="dashboard"&&<Dashboard produtos={produtos} notinhasAbertas={notinhasAbertas} totalNotinhas={totalNotinhas} totalHoje={totalHoje} qtdHoje={vendasHoje.length} vendasHoje={vendasHoje} alertas={alertas} setTab={setTab} onReload={carregar}/>}
        {tab==="venda"&&<Venda produtos={produtos} clientes={clientes} movimentos={movimentos} vendas={vendas} sb={sb} showToast={showToast} setModal={setModal} onReload={()=>{reloadProdutos();reloadMovimentos();reloadVendas();}}/>}
        {tab==="estoque"&&<Estoque produtos={produtos} sb={sb} showToast={showToast} setModal={setModal} onReload={reloadProdutos}/>}
        {tab==="notinhas"&&<Notinhas movimentos={movimentos} clientes={clientes} produtos={produtos} sb={sb} showToast={showToast} setModal={setModal} onReload={()=>{reloadMovimentos();reloadProdutos();}}/>}
        {tab==="clientes"&&<Clientes clientes={clientes} movimentos={movimentos} sb={sb} showToast={showToast} setModal={setModal} onReload={reloadClientes}/>}
      </div>

      {modal&&(
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            {modal.type==="novo-produto"&&<ModalProduto data={modal.data} onClose={()=>setModal(null)} sb={sb} showToast={showToast} onSave={()=>{setModal(null);reloadProdutos();showToast("Produto salvo!");}}/>}
            {modal.type==="nova-notinha"&&<ModalNotinha onClose={()=>setModal(null)} clientes={clientes} produtos={produtos} movimentos={movimentos} sb={sb} onSave={()=>{setModal(null);reloadMovimentos();reloadProdutos();showToast("Notinha lançada!");}}/>}
            {modal.type==="pagar-notinha"&&<ModalPagar data={modal.data} onClose={()=>setModal(null)} movimentos={movimentos} sb={sb} onSave={()=>{setModal(null);reloadMovimentos();showToast("Pagamento registrado! ✓");}}/>}
            {modal.type==="novo-cliente"&&<ModalCliente data={modal.data} onClose={()=>setModal(null)} sb={sb} onSave={()=>{setModal(null);reloadClientes();showToast("Cliente salvo!");}}/>}
            {modal.type==="entrada-estoque"&&<ModalEntrada data={modal.data} onClose={()=>setModal(null)} produtos={produtos} sb={sb} onSave={()=>{setModal(null);reloadProdutos();showToast("Estoque atualizado!");}}/>}
            {modal.type==="recibo"&&<ModalRecibo venda={modal.data} produtos={produtos} clientes={clientes} onClose={()=>setModal(null)}/>}
          </div>
        </div>
      )}
      {toast&&<div className={`toast ${toast.tipo==="err"?"err":""}`}>{toast.msg}</div>}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({produtos,notinhasAbertas,totalNotinhas,totalHoje,qtdHoje,vendasHoje,alertas,setTab,onReload}){

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{paddingTop:4,display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:11,color:"#8b7a50",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Resumo</div>
          <div className="section-title">Visão Geral</div>
        </div>
        <button className="btn-ghost" style={{fontSize:12,padding:"5px 10px"}} onClick={onReload}>↻ Atualizar</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[
          {label:"Vendas hoje",value:fmt(totalHoje),sub:`${qtdHoje} venda${qtdHoje!==1?"s":""}`,icon:"cart",color:"#2e7d32",bg:"#e8f5e9"},
          {label:"Notinhas abertas",value:fmt(totalNotinhas),sub:`${notinhasAbertas.length} cliente${notinhasAbertas.length!==1?"s":""}`,icon:"receipt",color:"#e65100",bg:"#fff3e0"},
          {label:"Produtos cadastrados",value:`${produtos.length} itens`,sub:"no sistema",icon:"box",color:"#1565c0",bg:"#e3f2fd"},
          {label:"Alertas estoque",value:`${alertas.length} item${alertas.length!==1?"s":""}`,sub:"abaixo do mínimo",icon:"alert",color:alertas.length>0?"#c62828":"#2e7d32",bg:alertas.length>0?"#ffebee":"#e8f5e9"},
        ].map((k,i)=>(
          <div key={i} className="card">
            <div style={{width:32,height:32,borderRadius:10,background:k.bg,display:"flex",alignItems:"center",justifyContent:"center",color:k.color,marginBottom:8}}><Icon name={k.icon} size={16}/></div>
            <div style={{fontSize:18,fontWeight:700,color:"#2a1f06",lineHeight:1}}>{k.value}</div>
            <div style={{fontSize:11,color:"#8b7a50",marginTop:4}}>{k.label}</div>
            <div style={{fontSize:10,color:"#b0a080",marginTop:1}}>{k.sub}</div>
          </div>
        ))}
      </div>
      {porPag.length>0&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:13,color:"#3a2c0e",marginBottom:10}}>Pagamentos de hoje</div>
          {porPag.map(p=>(
            <div key={p.id} className="row-item">
              <span style={{fontSize:14}}>{p.emoji} {p.label}</span>
              <span style={{fontWeight:700,color:"#2a1f06"}}>{fmt(p.total)}</span>
            </div>
          ))}
        </div>
      )}
      <button className="btn-green" style={{width:"100%",fontSize:16,padding:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}} onClick={()=>setTab("venda")}>
        <Icon name="cart" size={18}/> Nova Venda
      </button>
      {alertas.length>0&&(
        <div className="card" style={{border:"1.5px solid #ffccbc"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,color:"#e65100"}}><Icon name="alert" size={15}/><span style={{fontWeight:700,fontSize:13}}>Repor estoque</span></div>
          {alertas.map(p=>(
            <div key={p.id} className="row-item">
              <div><div style={{fontSize:13,fontWeight:600,color:"#3a2c0e"}}>{p.nome}</div><div style={{fontSize:11,color:"#8b7a50"}}>{p.categoria}</div></div>
              <span className="badge-alert">{p.estoque} {p.unidade}</span>
            </div>
          ))}
        </div>
      )}
      {notinhasAbertas.length>0&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:13,color:"#3a2c0e",marginBottom:10}}>Notinhas abertas</div>
          {notinhasAbertas.map(c=>(
            <div key={c.id} className="row-item">
              <span style={{fontSize:14,fontWeight:600,color:"#3a2c0e"}}>{c.nome}</span>
              <span style={{fontWeight:700,color:"#e65100"}}>{fmt(c.divida)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Scanner de Código de Barras ──────────────────────────────────────────────
function BarcodeScanner({onResult,onClose}){
  const videoRef=useRef(null);
  const readerRef=useRef(null);
  const [erro,setErro]=useState(null);
  const [status,setStatus]=useState("Iniciando câmera...");

  useEffect(()=>{
    let ativo=true;
    const reader=new ZXing.BrowserMultiFormatReader();
    readerRef.current=reader;

    reader.listVideoInputDevices().then(devices=>{
      if(!ativo)return;
      if(devices.length===0){ setErro("Nenhuma câmera encontrada."); return; }
      // Prefere câmera traseira
      const traseira=devices.find(d=>/back|traseira|rear|environment/i.test(d.label))||devices[devices.length-1];
      setStatus("Aponte para o código de barras");
      reader.decodeFromVideoDevice(traseira.deviceId, videoRef.current, (result,err)=>{
        if(result && ativo){
          ativo=false;
          if(navigator.vibrate) navigator.vibrate(100);
          onResult(result.getText());
          reader.reset();
        }
      });
    }).catch(e=>{
      setErro("Não foi possível acessar a câmera. Verifique as permissões do navegador.");
    });

    return ()=>{ ativo=false; try{reader.reset();}catch{} };
  },[]);

  return(
    <div className="scan-overlay">
      <div style={{padding:16,display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:2}}>
        <span style={{color:"#fff",fontWeight:600,fontSize:15}}>📷 Escanear produto</span>
        <button onClick={onClose} style={{color:"#fff",background:"rgba(255,255,255,.15)",borderRadius:20,padding:"6px 12px",fontSize:13}}>Fechar ✕</button>
      </div>
      <div style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <video ref={videoRef} style={{width:"100%",height:"100%",objectFit:"cover"}} muted playsInline/>
        {!erro && <div className="scan-frame"/>}
        {erro && (
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
            <div style={{background:"#fff",borderRadius:16,padding:24}}>
              <div style={{fontSize:32,marginBottom:8}}>🚫</div>
              <div style={{color:"#3a2c0e",fontWeight:600,fontSize:14}}>{erro}</div>
            </div>
          </div>
        )}
      </div>
      <div style={{padding:20,textAlign:"center",color:"#c4a85a",fontSize:13}}>{erro?"":status}</div>
    </div>
  );
}


function Venda({produtos,clientes,movimentos,vendas,sb,showToast,setModal,onReload}){
  const [itens,setItens]=useState([]);
  const [pagamento,setPagamento]=useState("dinheiro");
  const [clienteId,setClienteId]=useState("");
  const [troco,setTroco]=useState("");
  const [busca,setBusca]=useState("");
  const [view,setView]=useState("pdv");
  const [reciboAtual,setReciboAtual]=useState(null);
  const [salvando,setSalvando]=useState(false);
  const [scanning,setScanning]=useState(false);

  const prodsFiltrados=produtos.filter(p=>p.nome.toLowerCase().includes(busca.toLowerCase())&&Number(p.estoque)>0);
  const addItem=prod=>{
    setItens(its=>{
      const ex=its.find(i=>i.produtoId===prod.id);
      if(ex)return its.map(i=>i.produtoId===prod.id?{...i,qtd:i.qtd+1}:i);
      return[...its,{produtoId:prod.id,qtd:1}];
    });
    setBusca("");
  };

  const handleScan=(codigo)=>{
    setScanning(false);
    const prod=produtos.find(p=>p.codigo_barras===codigo);
    if(prod){
      if(Number(prod.estoque)<=0){ showToast(`${prod.nome} sem estoque!`,"err"); return; }
      addItem(prod);
      showToast(`✓ ${prod.nome} adicionado`);
    } else {
      showToast(`Código ${codigo} não cadastrado`,"err");
    }
  };

  const setQtd=(prodId,delta)=>setItens(its=>its.map(i=>i.produtoId===prodId?{...i,qtd:Math.max(0.1,+(i.qtd+delta).toFixed(1))}:i).filter(i=>i.qtd>0));
  const removeItem=prodId=>setItens(its=>its.filter(i=>i.produtoId!==prodId));
  const total=itens.reduce((s,it)=>{const p=produtos.find(p=>p.id===it.produtoId);return s+(p?Number(p.preco)*it.qtd:0);},0);
  const trocoVal=pagamento==="dinheiro"&&troco?Math.max(0,parseFloat(troco)-total):0;

  const finalizar=async()=>{
    if(itens.length===0){showToast("Adicione produtos","err");return;}
    if(pagamento==="notinha"&&!clienteId){showToast("Selecione o cliente","err");return;}
    if(pagamento==="notinha"){
      const c=clientes.find(c=>c.id===parseInt(clienteId));
      const divida=movimentos.filter(m=>m.cliente_id===c.id&&!m.pago).reduce((s,m)=>s+Number(m.valor),0);
      if(total>(Number(c.limite)-divida)){showToast(`Limite insuficiente! Disponível: ${fmt(Number(c.limite)-divida)}`,"err");return;}
    }
    setSalvando(true);
    try {
      // Salvar venda
      const vendaData = {
        data: now(),
        total,
        pagamento,
        cliente_id: pagamento==="notinha"?parseInt(clienteId):null,
        troco: trocoVal,
        itens: itens.map(it=>({produtoId:it.produtoId,qtd:it.qtd})),
      };
      const {data:novaVenda,error:errV}=await sb.from("vendas").insert(vendaData).select().single();
      if(errV) throw errV;

      // Baixar estoque
      for(const it of itens){
        const p=produtos.find(p=>p.id===it.produtoId);
        await sb.from("produtos").update({estoque:Math.max(0,Number(p.estoque)-it.qtd)}).eq("id",p.id);
      }

      // Se notinha, gerar movimentos
      if(pagamento==="notinha"){
        const movs=itens.map(it=>{
          const p=produtos.find(p=>p.id===it.produtoId);
          return{tipo:"notinha",cliente_id:parseInt(clienteId),produto_id:it.produtoId,qtd:it.qtd,valor:Number(p.preco)*it.qtd,data:now(),pago:false};
        });
        await sb.from("movimentos").insert(movs);
      }

      await onReload();
      setReciboAtual({...novaVenda, itens: vendaData.itens});
      setItens([]);setPagamento("dinheiro");setClienteId("");setTroco("");
      setView("recibo");showToast("Venda finalizada! ✓");
    } catch(e) {
      showToast("Erro ao salvar venda. Verifique a conexão.","err");
    } finally {
      setSalvando(false);
    }
  };

  if(view==="recibo"&&reciboAtual) return <ReciboInline venda={reciboAtual} produtos={produtos} clientes={clientes} onNova={()=>setView("pdv")} onHistorico={()=>setView("historico")}/>;
  if(view==="historico") return <HistoricoVendas vendas={vendas} produtos={produtos} clientes={clientes} onBack={()=>setView("pdv")} setModal={setModal}/>;

  if(scanning) return <BarcodeScanner onResult={handleScan} onClose={()=>setScanning(false)}/>;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div className="section-title">Nova Venda</div>
        <button className="btn-ghost" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>setView("historico")}><Icon name="eye" size={13}/> Histórico</button>
      </div>
      <div style={{position:"relative"}}>
        <div style={{display:"flex",gap:8}}>
          <input className="input" style={{flex:1}} placeholder="🔍 Buscar e adicionar produto..." value={busca} onChange={e=>setBusca(e.target.value)}/>
          <button onClick={()=>setScanning(true)} style={{width:46,background:"#3a2c0e",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#f5d78a",flexShrink:0}}>
            <Icon name="scan" size={20}/>
          </button>
        </div>
        {busca&&(
          <div style={{position:"absolute",top:"110%",left:0,right:0,background:"#fff",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.12)",zIndex:10,maxHeight:220,overflowY:"auto",border:"1.5px solid #e8e0d0"}}>
            {prodsFiltrados.length===0&&<div style={{padding:16,color:"#8b7a50",fontSize:13,textAlign:"center"}}>Nenhum produto encontrado</div>}
            {prodsFiltrados.map(p=>(
              <button key={p.id} onClick={()=>addItem(p)} style={{width:"100%",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f0ebe0",background:"none",textAlign:"left"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:"#2a1f06"}}>{p.nome}</div>
                  <div style={{fontSize:11,color:"#8b7a50"}}>{p.estoque} {p.unidade} em estoque</div>
                </div>
                <div style={{fontWeight:700,color:"#8b6914",fontSize:14}}>{fmt(p.preco)}</div>
              </button>
            ))}
          </div>
        )}
      </div>
      {itens.length>0&&(
        <div className="card">
          <div style={{fontWeight:700,fontSize:13,color:"#3a2c0e",marginBottom:10}}>Carrinho</div>
          {itens.map(it=>{
            const p=produtos.find(p=>p.id===it.produtoId);if(!p)return null;
            return(
              <div key={it.produtoId} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #f0ebe0"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#2a1f06"}}>{p.nome}</div>
                  <div style={{fontSize:12,color:"#8b7a50"}}>{fmt(p.preco)}/{p.unidade}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <button className="qty-btn" onClick={()=>setQtd(it.produtoId,-0.5)}>−</button>
                  <span style={{fontWeight:700,minWidth:28,textAlign:"center",fontSize:15}}>{it.qtd}</span>
                  <button className="qty-btn" onClick={()=>setQtd(it.produtoId,0.5)}>+</button>
                </div>
                <div style={{fontWeight:700,color:"#2a1f06",minWidth:60,textAlign:"right",fontSize:14}}>{fmt(Number(p.preco)*it.qtd)}</div>
                <button onClick={()=>removeItem(it.produtoId)} style={{color:"#c62828",padding:2}}><Icon name="x" size={14}/></button>
              </div>
            );
          })}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,padding:"10px 0 0",borderTop:"2px solid #3a2c0e"}}>
            <span style={{fontWeight:700,color:"#3a2c0e"}}>Total</span>
            <span style={{fontWeight:800,fontSize:20,color:"#3a2c0e"}}>{fmt(total)}</span>
          </div>
        </div>
      )}
      <div className="card">
        <div style={{fontWeight:700,fontSize:13,color:"#3a2c0e",marginBottom:10}}>Forma de pagamento</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {PAGAMENTOS.map(p=>(
            <button key={p.id} className={`pay-btn ${pagamento===p.id?"sel":""}`} onClick={()=>setPagamento(p.id)}>
              <span style={{fontSize:18}}>{p.emoji}</span><span>{p.label}</span>
            </button>
          ))}
        </div>
        {pagamento==="notinha"&&(
          <div style={{marginTop:12}}>
            <label className="label">Cliente</label>
            <select className="input" value={clienteId} onChange={e=>setClienteId(e.target.value)}>
              <option value="">Selecionar cliente...</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
            </select>
          </div>
        )}
        {pagamento==="dinheiro"&&(
          <div style={{marginTop:12,display:"flex",gap:10,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <label className="label">Valor recebido (R$)</label>
              <input className="input" type="number" step="0.01" placeholder="0,00" value={troco} onChange={e=>setTroco(e.target.value)}/>
            </div>
            {trocoVal>0&&(
              <div style={{background:"#e8f5e9",borderRadius:10,padding:"10px 14px",textAlign:"center"}}>
                <div style={{fontSize:10,color:"#2e7d32",fontWeight:600}}>TROCO</div>
                <div style={{fontSize:18,fontWeight:800,color:"#2e7d32"}}>{fmt(trocoVal)}</div>
              </div>
            )}
          </div>
        )}
      </div>
      <button className="btn-green" style={{width:"100%",fontSize:16,padding:16,display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:salvando?.6:1}} onClick={finalizar} disabled={salvando}>
        {salvando?"⏳ Salvando...": <><Icon name="check" size={18}/> Finalizar Venda · {fmt(total)}</>}
      </button>
    </div>
  );
}

// ─── Recibo Inline ────────────────────────────────────────────────────────────
function ReciboInline({venda,produtos,clientes,onNova,onHistorico}){
  const cliente=clientes.find(c=>c.id===venda.cliente_id);
  const pag=PAGAMENTOS.find(p=>p.id===venda.pagamento);
  const reciboRef=useRef(null);
  const [sharing,setSharing]=useState(false);
  const [shareResult,setShareResult]=useState(null);
  const handleShare=async()=>{
    if(!reciboRef.current)return;setSharing(true);
    try{const r=await compartilhar(reciboRef.current,`recibo-${venda.id}.png`);if(r==="downloaded")setShareResult("downloaded");}
    catch{setShareResult("error");}
    finally{setSharing(false);setTimeout(()=>setShareResult(null),3000);}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{textAlign:"center",padding:"20px 0 8px"}}>
        <div style={{fontSize:48}}>✅</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#2e7d32",marginTop:6}}>Venda Finalizada!</div>
        <div style={{fontSize:13,color:"#8b7a50",marginTop:4}}>{fmtDate(venda.data)} às {fmtTime(venda.data)}</div>
      </div>
      <div ref={reciboRef} style={{background:"#faf7f2",borderRadius:16,padding:20,border:"1.5px dashed #d4b97a"}}>
        <div style={{textAlign:"center",marginBottom:14,paddingBottom:12,borderBottom:"1px dashed #d4b97a"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#3a2c0e",fontWeight:700}}>🏪 Mini Box Andrérika</div>
          <div style={{fontSize:12,color:"#8b7a50",marginTop:4}}>Recibo · {fmtDate(venda.data)} {fmtTime(venda.data)}</div>
        </div>
        {(venda.itens||[]).map((it,i)=>{
          const p=produtos.find(p=>p.id===it.produtoId);
          return(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:14,borderBottom:"1px solid #ede8de"}}>
              <span style={{color:"#3a2c0e"}}>{p?.nome} <span style={{color:"#8b7a50",fontSize:12}}>x{it.qtd}</span></span>
              <span style={{fontWeight:600,color:"#2a1f06"}}>{fmt(p?Number(p.preco)*it.qtd:0)}</span>
            </div>
          );
        })}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12,paddingTop:10,borderTop:"2px dashed #d4b97a"}}>
          <span style={{fontWeight:700,fontSize:16,color:"#3a2c0e"}}>Total</span>
          <span style={{fontWeight:800,fontSize:22,color:"#2a1f06"}}>{fmt(venda.total)}</span>
        </div>
        <div style={{marginTop:10,padding:"8px 12px",background:"#fff",borderRadius:8,fontSize:13,display:"flex",justifyContent:"space-between",border:"1px solid #ede8de"}}>
          <span style={{color:"#8b7a50"}}>{pag?.emoji} {pag?.label}{cliente?` · ${cliente.nome}`:""}</span>
          {Number(venda.troco)>0&&<span style={{color:"#2e7d32",fontWeight:600}}>Troco: {fmt(venda.troco)}</span>}
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:"#b0a080"}}>Obrigado pela preferência! 🙏</div>
      </div>
      <button onClick={handleShare} disabled={sharing}
        style={{width:"100%",padding:"13px 20px",borderRadius:12,background:sharing?"#ccc":"#25D366",color:"#fff",fontWeight:700,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:10,border:"none",cursor:sharing?"wait":"pointer"}}>
        {sharing?"⏳ Gerando imagem...":shareResult==="downloaded"?"✅ Imagem salva! Abra o WhatsApp":shareResult==="error"?"❌ Tente novamente":"📲 Compartilhar pelo WhatsApp"}
      </button>
      <div style={{display:"flex",gap:10}}>
        <button className="btn-ghost" style={{flex:1}} onClick={onHistorico}><Icon name="eye" size={14}/> Histórico</button>
        <button className="btn-green" style={{flex:2}} onClick={onNova}><Icon name="plus" size={14}/> Nova Venda</button>
      </div>
    </div>
  );
}

// ─── Histórico ────────────────────────────────────────────────────────────────
function HistoricoVendas({vendas,produtos,clientes,onBack,setModal}){
  const [filtro,setFiltro]=useState("hoje");
  const hoje=new Date();
  const filtradas=vendas.filter(v=>{
    const d=new Date(v.data);
    if(filtro==="hoje")return d.toDateString()===hoje.toDateString();
    if(filtro==="mes")return d.getMonth()===hoje.getMonth()&&d.getFullYear()===hoje.getFullYear();
    return true;
  });
  const totalFiltro=filtradas.reduce((s,v)=>s+Number(v.total),0);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{color:"#8b6914"}}><Icon name="back" size={20}/></button>
        <div className="section-title">Histórico</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {[["hoje","Hoje"],["mes","Este mês"],["todos","Tudo"]].map(([id,label])=>(
          <button key={id} onClick={()=>setFiltro(id)} style={{flex:1,padding:"7px 4px",borderRadius:10,fontWeight:600,fontSize:12,background:filtro===id?"#8b6914":"#f0ebe0",color:filtro===id?"#fff":"#5a4a1e",transition:".15s"}}>{label}</button>
        ))}
      </div>
      <div className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>

// ─── Modal Recibo ─────────────────────────────────────────────────────────────
function ModalRecibo({venda,produtos,clientes,onClose}){
  const cliente=clientes.find(c=>c.id===venda.cliente_id);
  const pag=PAGAMENTOS.find(p=>p.id===venda.pagamento);
  const reciboRef=useRef(null);
  const [sharing,setSharing]=useState(false);
  const [shareResult,setShareResult]=useState(null);
  const handleShare=async()=>{
    if(!reciboRef.current)return;setSharing(true);
    try{const r=await compartilhar(reciboRef.current,`recibo-${venda.id}.png`);if(r==="downloaded")setShareResult("downloaded");}
    catch{setShareResult("error");}
    finally{setSharing(false);setTimeout(()=>setShareResult(null),3000);}
  };
  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#2a1f06",marginBottom:4}}>Recibo</div>
      <div style={{fontSize:12,color:"#8b7a50",marginBottom:14}}>{fmtDate(venda.data)} às {fmtTime(venda.data)}</div>
      <div ref={reciboRef} style={{background:"#faf7f2",borderRadius:12,padding:16,border:"1px dashed #d4b97a",marginBottom:14}}>
        <div style={{textAlign:"center",marginBottom:12,paddingBottom:10,borderBottom:"1px dashed #d4b97a"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"#3a2c0e",fontWeight:700}}>🏪 Mini Box Andrérika</div>
          <div style={{fontSize:11,color:"#8b7a50",marginTop:3}}>Recibo · {fmtDate(venda.data)} {fmtTime(venda.data)}</div>
        </div>
        {(venda.itens||[]).map((it,i)=>{
          const p=produtos.find(p=>p.id===it.produtoId);
          return(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",fontSize:13,borderBottom:"1px solid #ede8de"}}>
            <span style={{color:"#3a2c0e"}}>{p?.nome} <span style={{color:"#8b7a50"}}>x{it.qtd}</span></span>
            <span style={{fontWeight:600}}>{fmt(p?Number(p.preco)*it.qtd:0)}</span>
          </div>);
        })}
        <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 6px",borderTop:"2px dashed #d4b97a",marginTop:4}}>
          <span style={{fontWeight:700,fontSize:15}}>Total</span>
          <span style={{fontWeight:800,fontSize:20,color:"#2a1f06"}}>{fmt(venda.total)}</span>
        </div>
        <div style={{background:"#fff",borderRadius:8,padding:"8px 10px",fontSize:13,display:"flex",justifyContent:"space-between",border:"1px solid #ede8de"}}>
          <span style={{color:"#8b7a50"}}>{pag?.emoji} {pag?.label}{cliente?` · ${cliente.nome}`:""}</span>
          {Number(venda.troco)>0&&<span style={{color:"#2e7d32",fontWeight:600}}>Troco: {fmt(venda.troco)}</span>}
        </div>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:"#b0a080"}}>Obrigado pela preferência! 🙏</div>
      </div>
      <button onClick={handleShare} disabled={sharing}
        style={{width:"100%",padding:13,borderRadius:12,background:sharing?"#aaa":"#25D366",color:"#fff",fontWeight:700,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,border:"none",cursor:sharing?"wait":"pointer",marginBottom:10}}>
        {sharing?"⏳ Gerando...":shareResult==="downloaded"?"✅ Imagem salva!":shareResult==="error"?"❌ Tente novamente":"📲 Compartilhar pelo WhatsApp"}
      </button>
      <button className="btn-ghost" style={{width:"100%"}} onClick={onClose}>Fechar</button>
    </>
  );
}

// ─── Estoque ──────────────────────────────────────────────────────────────────

  const [busca,setBusca]=useState("");
  const [catFiltro,setCatFiltro]=useState("Todas");
  const cats=["Todas",...new Set(produtos.map(p=>p.categoria).filter(Boolean))];
  const filtrados=produtos.filter(p=>(catFiltro==="Todas"||p.categoria===catFiltro)&&p.nome.toLowerCase().includes(busca.toLowerCase()));
  const deletar=async id=>{
    if(!confirm("Remover produto?"))return;
    await sb.from("produtos").delete().eq("id",id);
    onReload();
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtrados.map(p=>(
          <div key={p.id} className="card" style={{border:Number(p.estoque)<=Number(p.minimo)?"1.5px solid #ffccbc":"1.5px solid transparent"}}>

// ─── Modais ───────────────────────────────────────────────────────────────────
function ModalProduto({data,onClose,sb,showToast,onSave}){
  const [form,setForm]=useState(data||{nome:"",categoria:"",preco:"",estoque:"",minimo:"",unidade:"un",codigo_barras:""});
  const [salvando,setSalvando]=useState(false);
  const [scanning,setScanning]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const salvar=async()=>{
    if(!form.nome||!form.preco)return alert("Preencha nome e preço");
    setSalvando(true);
    const payload={nome:form.nome,categoria:form.categoria,preco:parseFloat(form.preco),estoque:parseFloat(form.estoque)||0,minimo:parseInt(form.minimo)||3,unidade:form.unidade,codigo_barras:form.codigo_barras||null};
    if(data){await sb.from("produtos").update(payload).eq("id",data.id);}
    else{await sb.from("produtos").insert(payload);}
    setSalvando(false);onSave();
  };

  if(scanning) return <BarcodeScanner onResult={(codigo)=>{set("codigo_barras",codigo);setScanning(false);}} onClose={()=>setScanning(false)}/>;

  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2a1f06",marginBottom:20}}>{data?"Editar Produto":"Novo Produto"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label className="label">Nome</label><input className="input" value={form.nome} onChange={e=>set("nome",e.target.value)} placeholder="Ex: Queijo Canastra"/></div>
        <div>
          <label className="label">Código de barras</label>
          <div style={{display:"flex",gap:8}}>
            <input className="input" style={{flex:1}} value={form.codigo_barras||""} onChange={e=>set("codigo_barras",e.target.value)} placeholder="Opcional — para produtos industrializados"/>
            <button onClick={()=>setScanning(true)} style={{width:46,background:"#3a2c0e",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#f5d78a",flexShrink:0}}>
              <Icon name="scan" size={18}/>
            </button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><label className="label">Categoria</label><input className="input" value={form.categoria} onChange={e=>set("categoria",e.target.value)}/></div>
          <div><label className="label">Unidade</label>
            <select className="input" value={form.unidade} onChange={e=>set("unidade",e.target.value)}>
              {["un","kg","g","L","ml","cx","fardo"].map(u=><option key={u}>{u}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          <div><label className="label">Preço R$</label><input className="input" type="number" step="0.01" value={form.preco} onChange={e=>set("preco",e.target.value)}/></div>
          <div><label className="label">Estoque</label><input className="input" type="number" value={form.estoque} onChange={e=>set("estoque",e.target.value)}/></div>
          <div><label className="label">Mínimo</label><input className="input" type="number" value={form.minimo} onChange={e=>set("minimo",e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{flex:2,opacity:salvando?.6:1}} onClick={salvar} disabled={salvando}>{salvando?"Salvando...":"Salvar produto"}</button>
        </div>
      </div>
    </>
  );
}

function ModalEntrada({data,onClose,produtos,sb,onSave}){
  const [prodId,setProdId]=useState(data?.id||produtos[0]?.id||"");
  const [qtd,setQtd]=useState("");
  const [salvando,setSalvando]=useState(false);
  const prod=produtos.find(p=>p.id===parseInt(prodId)||p.id===prodId);
  const salvar=async()=>{
    if(!qtd||parseFloat(qtd)<=0)return alert("Informe a quantidade");
    setSalvando(true);
    await sb.from("produtos").update({estoque:Number(prod.estoque)+parseFloat(qtd)}).eq("id",prod.id);
    setSalvando(false);onSave();
  };
  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2a1f06",marginBottom:20}}>Entrada de Estoque</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label className="label">Produto</label>
          <select className="input" value={prodId} onChange={e=>setProdId(e.target.value)}>
            {produtos.map(p=><option key={p.id} value={p.id}>{p.nome} (atual: {p.estoque} {p.unidade})</option>)}
          </select>
        </div>
        {prod&&<div style={{background:"#faf7f2",borderRadius:10,padding:12,fontSize:13,color:"#5a4a1e"}}>Estoque atual: <strong>{prod.estoque} {prod.unidade}</strong></div>}
        <div><label className="label">Quantidade a adicionar</label><input className="input" type="number" step="0.1" value={qtd} onChange={e=>setQtd(e.target.value)}/></div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{flex:2,opacity:salvando?.6:1}} onClick={salvar} disabled={salvando}>{salvando?"Salvando...":"Confirmar entrada"}</button>
        </div>
      </div>
    </>
  );
}

function ModalNotinha({onClose,clientes,produtos,movimentos,sb,onSave}){
  const [clienteId,setClienteId]=useState(clientes[0]?.id||"");
  const [itens,setItens]=useState([{produtoId:produtos[0]?.id||"",qtd:1}]);
  const [salvando,setSalvando]=useState(false);
  const addItem=()=>setItens(i=>[...i,{produtoId:produtos[0]?.id||"",qtd:1}]);
  const setItem=(idx,k,v)=>setItens(i=>i.map((it,j)=>j===idx?{...it,[k]:v}:it));
  const remItem=idx=>setItens(i=>i.filter((_,j)=>j!==idx));
  const total=itens.reduce((s,it)=>{const p=produtos.find(p=>p.id===parseInt(it.produtoId)||p.id===it.produtoId);return s+(p?Number(p.preco)*parseFloat(it.qtd||0):0);},0);
  const cliente=clientes.find(c=>c.id===parseInt(clienteId)||c.id===clienteId);
  const dividaAtual=cliente?movimentos.filter(m=>m.cliente_id===cliente.id&&!m.pago).reduce((s,m)=>s+Number(m.valor),0):0;
  const limiteDisp=cliente?Number(cliente.limite)-dividaAtual:0;
  const salvar=async()=>{
    if(!clienteId)return alert("Selecione o cliente");
    if(total>limiteDisp)return alert(`Limite insuficiente! Disponível: ${fmt(limiteDisp)}`);
    setSalvando(true);
    const movs=itens.map(it=>{
      const p=produtos.find(p=>p.id===parseInt(it.produtoId)||p.id===it.produtoId);
      return{tipo:"notinha",cliente_id:parseInt(clienteId),produto_id:p.id,qtd:parseFloat(it.qtd),valor:Number(p.preco)*parseFloat(it.qtd),data:now(),pago:false};
    });
    await sb.from("movimentos").insert(movs);
    for(const it of itens){
      const p=produtos.find(p=>p.id===parseInt(it.produtoId)||p.id===it.produtoId);
      await sb.from("produtos").update({estoque:Math.max(0,Number(p.estoque)-parseFloat(it.qtd))}).eq("id",p.id);
    }
    setSalvando(false);onSave();
  };
  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2a1f06",marginBottom:20}}>Lançar na Notinha</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label className="label">Cliente</label><select className="input" value={clienteId} onChange={e=>setClienteId(e.target.value)}>{clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select></div>
        {cliente&&<div style={{background:"#faf7f2",borderRadius:10,padding:10,display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#8b7a50"}}>Crédito disponível:</span><strong style={{color:limiteDisp<total?"#c62828":"#2e7d32"}}>{fmt(limiteDisp)}</strong></div>}
        <div>
          <label className="label">Itens</label>
          {itens.map((it,idx)=>(
            <div key={idx} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
              <select className="input" style={{flex:3}} value={it.produtoId} onChange={e=>setItem(idx,"produtoId",e.target.value)}>{produtos.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}</select>
              <input className="input" type="number" style={{flex:1}} value={it.qtd} onChange={e=>setItem(idx,"qtd",e.target.value)} min="0.1" step="0.1"/>
              {itens.length>1&&<button onClick={()=>remItem(idx)} style={{color:"#c62828"}}><Icon name="x" size={16}/></button>}
            </div>
          ))}
          <button className="btn-ghost" style={{width:"100%",fontSize:13}} onClick={addItem}>+ Adicionar item</button>
        </div>
        <div style={{background:"#3a2c0e",borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#c4a85a",fontWeight:600}}>Total</span>
          <span style={{color:"#f5d78a",fontWeight:800,fontSize:20}}>{fmt(total)}</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{flex:2,opacity:salvando?.6:1}} onClick={salvar} disabled={salvando}>{salvando?"Salvando...":"Lançar"}</button>
        </div>
      </div>
    </>
  );
}

function ModalPagar({data,onClose,movimentos,sb,onSave}){
  const [tipo,setTipo]=useState("total");
  const [valor,setValor]=useState(data.divida.toFixed(2));
  const [salvando,setSalvando]=useState(false);
  const salvar=async()=>{
    const pagar=parseFloat(valor);
    if(!pagar||pagar<=0)return alert("Informe o valor");
    setSalvando(true);
    let restante=pagar;
    for(const m of movimentos.filter(m=>m.cliente_id===data.id&&!m.pago)){
      if(restante<=0)break;
      if(restante>=Number(m.valor)){
        await sb.from("movimentos").update({pago:true}).eq("id",m.id);
        restante-=Number(m.valor);
      } else {
        await sb.from("movimentos").update({valor:Number(m.valor)-restante}).eq("id",m.id);
        restante=0;
      }
    }
    setSalvando(false);onSave();
  };
  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2a1f06",marginBottom:4}}>Registrar Pagamento</div>
      <div style={{fontSize:14,color:"#8b7a50",marginBottom:16}}>{data.nome}</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{background:"#faf7f2",borderRadius:12,padding:16,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#8b7a50",fontWeight:600,textTransform:"uppercase"}}>Total em aberto</div>
          <div style={{fontSize:32,fontWeight:800,color:"#e65100",marginTop:4}}>{fmt(data.divida)}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          {["total","parcial"].map(t=>(
            <button key={t} onClick={()=>{setTipo(t);if(t==="total")setValor(data.divida.toFixed(2));}}
              style={{flex:1,padding:10,borderRadius:10,fontWeight:600,fontSize:13,background:tipo===t?"#8b6914":"#f0ebe0",color:tipo===t?"#fff":"#5a4a1e",transition:".15s"}}>
              {t==="total"?"Total":"Parcial"}
            </button>
          ))}
        </div>
        {tipo==="parcial"&&<div><label className="label">Valor pago (R$)</label><input className="input" type="number" step="0.01" value={valor} onChange={e=>setValor(e.target.value)}/></div>}
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{flex:2,opacity:salvando?.6:1}} onClick={salvar} disabled={salvando}>{salvando?"Salvando...":"Confirmar "+fmt(parseFloat(valor)||0)}</button>
        </div>
      </div>
    </>
  );
}

function ModalCliente({data,onClose,sb,onSave}){
  const [form,setForm]=useState(data||{nome:"",telefone:"",limite:300});
  const [salvando,setSalvando]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const salvar=async()=>{
    if(!form.nome)return alert("Informe o nome");
    setSalvando(true);
    const payload={nome:form.nome,telefone:form.telefone,limite:parseFloat(form.limite)||300};
    if(data){await sb.from("clientes").update(payload).eq("id",data.id);}
    else{await sb.from("clientes").insert(payload);}
    setSalvando(false);onSave();
  };
  return(
    <>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#2a1f06",marginBottom:20}}>{data?"Editar Cliente":"Novo Cliente"}</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label className="label">Nome</label><input className="input" value={form.nome} onChange={e=>set("nome",e.target.value)}/></div>
        <div><label className="label">Telefone</label><input className="input" value={form.telefone} onChange={e=>set("telefone",e.target.value)}/></div>
        <div><label className="label">Limite de crédito R$</label><input className="input" type="number" value={form.limite} onChange={e=>set("limite",e.target.value)}/></div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{flex:2,opacity:salvando?.6:1}} onClick={salvar} disabled={salvando}>{salvando?"Salvando...":"Salvar cliente"}</button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
</script>
</body>
</html>
